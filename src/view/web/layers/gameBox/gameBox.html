<section class="game-container">
  <h2>🎱 내 번호 당첨 확인 🎱</h2>
  <form class="purchase-form">
    <label for="price">구입할 금액을 입력해주세요.</label>
    <div class="purchase-container" data-type="dynamic">
      <button type="submit" class="purchase-button">구입</button>
    </div>
  </form>
  <div class="lotto-container">
    <p class="purchase-message" data-type="dynamic"></p>
    <ul class="lotto-list" data-type="dynamic"></ul>
  </div>
</section>
