<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="src/css/index.css" /> -->
    <link rel="stylesheet" href="src/css/layout.css" />
    <link rel="stylesheet" href="src/css/text.css" />
    <link rel="stylesheet" href="src/css/forms.css" />
    <link rel="stylesheet" href="src/css/buttons.css" />
    <link rel="stylesheet" href="src/css/modal.css" />
    <link rel="stylesheet" href="src/css/tables.css" />
    <link rel="icon" href="./favicon.ico" />
  </head>

  <body id="container">
    <header>
      <h1>🎱 행운의 로또</h1>
    </header>
    <div id="content">
      <h1 id="title">🎱 내 번호 당첨 확인 🎱</h1>
      <div>
        <div id="title-input-purchase-amount">구입할 금액을 입력해주세요.</div>
        <div id="input-purchase-amount-area">
          <input id="input-purchase-amount" type="text" placeholder="금액" />
          <button id="button-purchase" disabled>구입</button>
        </div>
        <p id="purchase-amount-helper-text"><!-- 구입 금액 헬퍼텍스트 --></p>
      </div>
      <div>
        <div id="purchased-count"></div>
        <div id="generated-lottos"></div>
      </div>
      <div id="content-bottom">
        <form id="winning-form">
          <div id="title-input-winnings-and-bonus">
            지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.
          </div>
          <div id="input-winnings-and-bonus-section">
            <div id="input-winning-numbers-section">
              <div id="title-input-winnings">당첨 번호</div>
              <div id="input-winning-numbers">
                <input
                  type="text"
                  class="lotto-input"
                  name="winning-number"
                  maxlength="2"
                  required
                />
                <input
                  type="text"
                  class="lotto-input"
                  name="winning-number"
                  maxlength="2"
                  required
                />
                <input
                  type="text"
                  class="lotto-input"
                  name="winning-number"
                  maxlength="2"
                  required
                />
                <input
                  type="text"
                  class="lotto-input"
                  name="winning-number"
                  maxlength="2"
                  required
                />
                <input
                  type="text"
                  class="lotto-input"
                  name="winning-number"
                  maxlength="2"
                  required
                />
                <input
                  type="text"
                  class="lotto-input"
                  name="winning-number"
                  maxlength="2"
                  required
                />
              </div>
            </div>
            <div>
              <div id="input-bonus-number-section">
                <div id="title-input-bonus">보너스 번호</div>
                <div id="input-bonus-numbers">
                  <input
                    type="text"
                    class="lotto-input"
                    name="bonus-number"
                    maxlength="2"
                    required
                  />
                </div>
              </div>
            </div>
          </div>
          <p id="winnings-and-bonus-helper-text">
            <!-- 당첨 번호 및 보너스 번호 헬퍼텍스트 -->
          </p>

          <div>
            <button id="button-check-result" disabled>결과 확인하기</button>
          </div>
        </form>
      </div>

      <dialog id="winning-stats-modal">
        <div id="close-modal"><img src="./public/images/close.png" /></div>
        <h2 id="winning-stats-modal-title"></h2>
        <table id="winning-stats-table">
          <thead>
            <tr>
              <th>일치 개수</th>
              <th>당첨금</th>
              <th>당첨 개수</th>
            </tr>
          </thead>
          <tbody id="winning-stats-table-content">
            <!-- 당첨 내역 -->
          </tbody>
        </table>
        <h3 id="yield-rate"></h3>
        <button id="button-restart">다시 시작하기</button>
      </dialog>
    </div>
    <footer>
      <hr id="line" />
      <p id="copyright">Copyright 2023. woowacourse</p>
    </footer>

    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
