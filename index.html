<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="module" src="./src/step2-index.js"></script>
    <header id="app">
      <h1 class="title">🎱 행운의 로또</h1>
    </header>
    <content class="content">
      <card class="main-contents">
        <p class="title">🎱 내 번호 당첨 확인 🎱</p>
        <div class="input-contents body">
          <p>구입할 금액을 입력해주세요.</p>
          <form>
            <input placeholder="금액" maxlength="10" autofocus />
            <button class="caption">구입</button>
          </form>
        </div>
        <div class="lotto-contents">
          <!-- 발행된 lotto list 보여짐 -->
        </div>
        <div class="winningLotto-contents body">
          <p>지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</p>
          <form id="lottoForm">
            <div class="winningLotto-contents_winningLotto">
              <p>당첨 번호</p>
              <div>
                <input maxlength="2" value="" />
                <input maxlength="2" value="" />
                <input maxlength="2" value="" />
                <input maxlength="2" value="" />
                <input maxlength="2" value="" />
                <input maxlength="2" value="" />
              </div>
            </div>
            <div class="winningLotto-contents_bonusNumber">
              <p>보너스 번호</p>
              <input maxlength="2" />
            </div>
          </form>
        </div>
        <button class="result-contents caption" form="lottoForm">
          결과 확인하기
        </button>
      </card>
    </content>

    <modal>
      <div class="prize-contents">
        <p class="subtitle">🏆 당첨 통계 🏆</p>
        <img
          src="./src/assets/close.png"
          alt="닫기 버튼"
          class="close-button"
        />
        <table class="result-table">
          <!-- lotto table header -->
          <tbody class="body">
            <!-- lotto table body -->
          </tbody>
        </table>
        <!-- lotto prize rate result -->
        <button class="restart-button">다시 시작하기</button>
      </div>
    </modal>

    <footer><p class="caption">Copyright 2023. woowacourse</p></footer>
  </body>
</html>
