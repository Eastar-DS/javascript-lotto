<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <div id="app">
      <header>
        <h1 class="text-title logo">🎱행운의 로또</h1>
      </header>

      <main class="text-body">
        <div class="lotto-box">
          <div>
            <h2 class="text-tile title">🎱내 번호 당첨 확인🎱</h2>
            <p>구입할 금액을 입력해주세요.</p>
            <form class="purchase">
              <input type="number" placeholder="금액" />
              <button type="submit">구입</button>
            </form>
          </div>

          <div class="purchase-history"></div>

          <div class="winning-lotto">
            <p>지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</p>
            <div class="description">
              <p>당첨 번호</p>
              <p>보너스 번호</p>
            </div>

            <form class="form__winning-numbers">
              <div class="inputs__winning-number">
                <div class="winning-numbers">
                  <input
                    type="number"
                    min="1"
                    max="45"
                    class="winning-number"
                  />
                  <input
                    type="number"
                    min="1"
                    max="45"
                    class="winning-number"
                  />
                  <input
                    type="number"
                    min="1"
                    max="45"
                    class="winning-number"
                  />
                  <input
                    type="number"
                    min="1"
                    max="45"
                    class="winning-number"
                  />
                  <input
                    type="number"
                    min="1"
                    max="45"
                    class="winning-number"
                  />
                  <input
                    type="number"
                    min="1"
                    max="45"
                    class="winning-number"
                  />
                </div>
                <input type="number" min="1" max="45" class="bonus-number" />
              </div>
              <button class="result" disabled>결과 확인하기</button>
            </form>
          </div>

          <div class="overlay">
            <div class="modal">
              <div class="close">&times;</div>
              <h3 class="text-title">🏆당첨 통계🏆</h3>
              <table class="description">
                <tr>
                  <th>일치 갯수</th>
                  <th>당첨금</th>
                  <th>당첨 갯수</th>
                </tr>
              </table>
              <button class="retry">다시 시작하기</button>
            </div>
          </div>
        </div>
      </main>

      <footer>
        <hr />
        <p>Copyright 2025. woowacourse</p>
      </footer>
    </div>
    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
