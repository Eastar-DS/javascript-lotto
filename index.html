<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎱 행운의 로또 🎱</title>
    <link rel="stylesheet" href="./src/ui/css/reset.css" />
    <link rel="stylesheet" href="./src/ui/css/global.css" />
    <link rel="stylesheet" href="./src/ui/css/layout.css" />
    <link rel="stylesheet" href="./src/ui/css/header.css" />
    <link rel="stylesheet" href="./src/ui/css/footer.css" />
    <link rel="stylesheet" href="./src/ui/css/lotto-check.css" />
    <link rel="stylesheet" href="./src/ui/css/winning-statistics.css" />
  </head>

  <body>
    <div id="app">
      <header class="lotto-header">
        <h1 class="text-title">🎱 행운의 로또</h1>
      </header>

      <main>
        <section class="lotto-check">
          <h2 class="text-title">🎱 내 당첨 번호 확인 🎱</h2>
          <div class="amount-input">
            <label for="purchase-amount" class="text-body"
              >구입할 금액을 입력해주세요.</label
            >
            <div class="input">
              <input
                type="text"
                id="purchase-amount"
                class="text-placeholder"
                placeholder="금액"
              />
              <button id="purchase-btn" class="text-caption">구입</button>
            </div>
          </div>
          <div class="text-body">
            <div class="lotto-list-container">
              <p id="lotto-count-text"></p>
              <ul id="lotto-list" class="text-body"></ul>
            </div>
            <div class="get-numbers" style="display: none">
              <p>지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</p>
              <div class="number-input">
                <div class="winning-number">
                  <label class="winning-number-label">당첨 번호</label>
                  <div class="number-box">
                    <input type="text" class="winning-number" maxlength="2" />
                    <input type="text" class="winning-number" maxlength="2" />
                    <input type="text" class="winning-number" maxlength="2" />
                    <input type="text" class="winning-number" maxlength="2" />
                    <input type="text" class="winning-number" maxlength="2" />
                    <input type="text" class="winning-number" maxlength="2" />
                  </div>
                </div>
                <div class="bonus-number">
                  <label class="bonus-number-label">보너스 번호</label>
                  <div class="number-box">
                    <input type="text" class="bonus-number" maxlength="2" />
                  </div>
                </div>
              </div>
            </div>

            <button
              id="check-result-btn"
              class="text-caption"
              style="display: none"
            >
              결과 확인하기
            </button>
          </div>
        </section>

        <!-- ✅ 모달 배경 추가 -->
        <div class="modal-overlay" id="modal-overlay">
          <section id="winning-statistics-modal">
            <button class="modal-close" id="close-modal">✖</button>
            <h2 class="text-title">🏆 당첨 통계 🏆</h2>
            <table class="lotto-table text-body">
              <thead>
                <tr>
                  <th>일치 갯수</th>
                  <th>당첨금</th>
                  <th>당첨 갯수</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>3개</td>
                  <td>5,000</td>
                  <td>n개</td>
                </tr>
                <tr>
                  <td>4개</td>
                  <td>50,000</td>
                  <td>n개</td>
                </tr>
                <tr>
                  <td>5개</td>
                  <td>1,500,000</td>
                  <td>n개</td>
                </tr>
                <tr>
                  <td>5개+보너스볼</td>
                  <td>30,000,000</td>
                  <td>n개</td>
                </tr>
                <tr>
                  <td>6개</td>
                  <td>2,000,000,000</td>
                  <td>n개</td>
                </tr>
              </tbody>
            </table>
            <h3 class="winnind-rate text-body">당신의 총 수익률은 %입니다.</h3>
            <button id="restart-btn" class="text-caption">다시 시작하기</button>
          </section>
        </div>
      </main>

      <footer>
        <p class="text-caption">Copyright 2023. woowacourse</p>
      </footer>
    </div>
    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
