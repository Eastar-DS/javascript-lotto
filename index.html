<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/styles.css" />
    <link rel="stylesheet" href="/styles/modal.css" />
    <link rel="stylesheet" href="/styles/header.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/footer.css" />
    <link
      rel="preload"
      href="/javascript-lotto/vector.svg"
      as="image"
      type="image/svg+xml"
    />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="header-title">🎱 행운의 로또</h1>
      </header>
      <main class="main">
        <h2 class="main-winning-check-title">🎱 내 번호 당첨 확인 🎱</h2>
        <section class="main-purchase-amount">
          <form id="lottoPurchaseForm" class="main-purchase-amount-form">
            <article class="main-purchase-amount-input-label-container">
              <label
                class="main-purchase-amount-input-label"
                for="purchaseAmountInput"
              >
                구입할 금액을 입력해주세요.
              </label>
              <input
                id="purchaseAmountInput"
                class="main-purchase-amount-input"
                name="purchaseAmount"
                type="number"
                placeholder="금액"
              />
            </article>
            <button
              id="purchaseAmountButton"
              class="main-purchase-amount-button"
            >
              구입
            </button>
          </form>
        </section>
        <section id="lottoListWinningLottoContainer"></section>
      </main>
      <footer class="footer">
        <p class="footer-text">Copyright 2023. woowacourse</p>
      </footer>
    </div>
    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
