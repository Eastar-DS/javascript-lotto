<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/styles/common.css" />
    <link rel="stylesheet" href="./src/styles/form.css" />
    <link rel="stylesheet" href="./src/styles/layout.css" />
    <link rel="stylesheet" href="./src/styles/modal.css" />
  </head>

  <body>
    <header id="app">
      <h1>🎱 행운의 로또</h1>
    </header>
    <div class="lotto-app">
      <h1 id="lotto-app-header">🎱 내 당첨 번호 확인 🎱</h1>
      <div id="purchase-header">구입할 금액을 입력해주세요.</div>
      <form class="purchase-form" id="purchase-form">
        <input id="purchase-input" name="purchase-input" placeholder="금액" type="number" />
        <button id="purchase-button">구입</button>
      </form>
      <div id="result"></div>
      <div class="system-message" id="system-message">
        <div id="message-container">지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</div>
        <div class="number-text">
          <div id="winning-number">당첨 번호</div>
          <div id="bonus-number">보너스 번호</div>
        </div>
        <div class="number-input" id="number-input">
          <div id="div-winning-number">
            <input type="number" class="winning-number" id="winningNumber0" />
            <input type="number" class="winning-number" id="winningNumber1" />
            <input type="number" class="winning-number" id="winningNumber2" />
            <input type="number" class="winning-number" id="winningNumber3" />
            <input type="number" class="winning-number" id="winningNumber4" />
            <input type="number" class="winning-number" id="winningNumber5" />
          </div>
          <div id="div-bonus-number">
            <input type="number" id="bonusNumber" />
          </div>
        </div>

        <button id="result-button">결과 확인하기</button>
      </div>
    </div>

    <div class="modal">
      <div class="modal-body">
        <button class="modal-close">x</button>
        <div class="modal-header" id="modal-header">🏆 당첨 통계 🏆</div>
        <table class="modal-table">
          <tr>
            <th scope="col">일치 갯수</th>
            <th scope="col">당첨금</th>
            <th scope="col">당첨 갯수</th>
          </tr>
          <tr>
            <td>3개</td>
            <td>5,000</td>
            <td id="three-count"></td>
          </tr>
          <tr>
            <td>4개</td>
            <td>50,000</td>
            <td id="four-count"></td>
          </tr>
          <tr>
            <td>5개</td>
            <td>1,500,000</td>
            <td id="five-count"></td>
          </tr>
          <tr>
            <td>5개+보너스 볼</td>
            <td>30,000,000</td>
            <td id="five-count-with-bonus"></td>
          </tr>
          <tr>
            <td>6개</td>
            <td>2,000,000,000</td>
            <td id="six-count"></td>
          </tr>
        </table>

        <div id="revenue-container"></div>
        <button id="restart-button">다시 시작하기</button>
      </div>
    </div>

    <footer>
      <hr />
      <div id="footer-text">Copyright 2023. woowacourse</div>
    </footer>

    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
