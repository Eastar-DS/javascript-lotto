<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" crossorigin src="/javascript-lotto/assets/index-UEOm8BkQ.js"></script>
    <link rel="stylesheet" crossorigin href="/javascript-lotto/assets/index-C3wy1Ab_.css">
  </head>

  <body>
    <header id="app" class="header">
      <h1 class="header-title">🎱 행운의 로또</h1>
    </header>

    <main class="main">
      <section class="card">
        <h2 class="card-title">🎱 내 번호 당첨 확인 🎱</h2>

        <form id="money-form" class="money-form">
          <label for="money-input" class="label"
            >구입할 금액을 입력해주세요.</label
          >
          <div class="input-row">
            <input
              id="money-input"
              class="input"
              type="number"
              placeholder="ex) 5000"
            />
            <button type="submit" class="btn btn-small">구입</button>
          </div>
        </form>

        <section id="lotto-section" class="lotto-section hidden">
          <p id="buy-count"></p>
          <ul id="lotto-list" class="lotto-list"></ul>
        </section>

        <section id="winning-section" class="winning-section hidden">
          <p>지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</p>
          <div class="winning-inputs">
            <div class="winning-numbers">
              <label for="winning-number" class="label">당첨 번호</label>
              <div class="number-inputs">
                <input
                  type="number"
                  id="winning-number"
                  class="input input-small winning-number"
                />
                <input type="number" class="input input-small winning-number" />
                <input type="number" class="input input-small winning-number" />
                <input type="number" class="input input-small winning-number" />
                <input type="number" class="input input-small winning-number" />
                <input type="number" class="input input-small winning-number" />
              </div>
            </div>
            <div class="bonus-number">
              <label for="bonus-number" class="label">보너스 번호</label>
              <div class="number-inputs">
                <input
                  type="number"
                  id="bonus-number"
                  class="input input-small"
                />
              </div>
            </div>
          </div>
          <button type="button" id="result-btn" class="btn btn-full">
            결과 확인하기
          </button>
        </section>
      </section>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <button type="button" id="modal-close" class="modal-close">x</button>
        <h3 class="modal-title">🏆 당첨 통계 🏆</h3>
        <table class="result-table">
          <thead>
            <tr>
              <th>일치 갯수</th>
              <th>당첨금</th>
              <th>당첨 갯수</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>3개</td>
              <td>5,000</td>
              <td id="rank-5th">0개</td>
            </tr>
            <tr>
              <td>4개</td>
              <td>50,000</td>
              <td id="rank-4th">0개</td>
            </tr>
            <tr>
              <td>5개</td>
              <td>1,500,000</td>
              <td id="rank-3rd">0개</td>
            </tr>
            <tr>
              <td>5개+보너스볼</td>
              <td>30,000,000</td>
              <td id="rank-2nd">0개</td>
            </tr>
            <tr>
              <td>6개</td>
              <td>2,000,000,000</td>
              <td id="rank-1st">0개</td>
            </tr>
          </tbody>
        </table>
        <p id="profit-rate" class="profit-text">
          당신의 총 수익률은 <strong id=="profit-rate-value">0</strong>%입니다.
        </p>
        <button type="button" id="restart-btn" class="btn btn-full">
          다시 시작하기
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright 2026. woowacourse</p>
    </footer>
  </body>
</html>
