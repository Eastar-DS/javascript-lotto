<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style/reset.css" />
    <link rel="stylesheet" href="./src/style/header.css" />
    <link rel="stylesheet" href="./src/style/main.css" />
    <link rel="stylesheet" href="./src/style/footer.css" />
    <link rel="stylesheet" href="./src/style/purchase.css" />
    <link rel="stylesheet" href="./src/style/userLotto.css" />
    <link rel="stylesheet" href="./src/style/winningInput.css" />
    <link rel="stylesheet" href="./src/style/winningResult.css" />
  </head>

  <body>
    <section class="modal-container">
      <dialog class="winning-result-dialog">
        <button class="winning-result-close-button" aria-label="닫기"></button>
        <h3 class="winning-result-title">🏆 당첨 통계 🏆</h3>
        <div class="winning-result-table-container"></div>
        <button class="winning-result-restart-button">다시 시작하기</button>
      </dialog>
    </section>
    <div id="app">
      <header class="header-container">
        <h1 class="header-title">🎱 행운의 로또</h1>
      </header>
      <main class="lotto-container">
        <h1 class="lotto-title">🎱 내 번호 당첨 확인 🎱</h1>
        <section class="purchase-container">
          <p class="purchase-text">구입할 금액을 입력해주세요.</p>
          <form class="purchase-form">
            <input
              class="purchase-input"
              type="number"
              placeholder="금액"
              min="1000"
              max="100000"
              required
              autofocus
            />
            <button class="purchase-button" type="submit">구입</button>
          </form>
        </section>
        <section class="user-lotto-container"></section>
        <section class="winning-input-container"></section>
      </main>
      <footer class="footer-container">
        <p class="footer-text">Copyright 2023. woowacourse</p>
      </footer>
    </div>

    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
