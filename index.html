<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>🎱 행운의 로또</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./index.css" />
  <script type="module" src="./src/step2-index.js" defer></script>
</head>
<body>
<div id="app">
  <header>
    <h1>🎱 행운의 로또</h1>
  </header>
  <main>
    <div class="container">
      <p class="lotto-title">🎱 내 번호 당첨 확인 🎱</p>

      <div class="purchase-amount">
        <div class="purchase-amount-input">
          <label for="input">구입할 금액을 입력해주세요.</label>
          <input type="number" id="input" placeholder="금액" />
        </div>
        <button id="check">구입</button>
      </div>
      <div class="lotto-purchase-message">
        <p class="lotto-count" id="lotto-count"></p>
      </div>
        <div class="lotto-container"></div>

      <div class="winning-number-and-bonus" id="winning-number-and-bonus">
        <p class="winning-number-and-bonus-message">
          지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.
        </p>
        <div class="winning-number-and-bonus-input">
          <div class="winning-number">
            <label for="winning-number-input-1">당첨 번호</label>
            <div class="winning-number-input">
              <input class="number-input" type="number" id="winning-number-input-1" />
              <input class="number-input" type="number" id="winning-number-input-2" />
              <input class="number-input" type="number" id="winning-number-input-3" />
              <input class="number-input" type="number" id="winning-number-input-4" />
              <input class="number-input" type="number" id="winning-number-input-5" />
              <input class="number-input" type="number" id="winning-number-input-6" />
            </div>
          </div>
          <div class="bonus">
            <label for="bonus-input">보너스 번호</label>
            <input class="number-input" type="number" id="bonus-input" />
          </div>
        </div>
        <button class="submit" id="winning-result-button" type="button" disabled>
          결과 확인하기
        </button>
      </div>

      <dialog>
        <div class="dialog-container">
          <h3>🏆 당첨 통계 🏆</h3>
          <button class="modal-close-button" id="modal-close-button">
            <img src="./public/images/close.svg" alt="close" width="24" />
          </button>
          <div class="modal-contents">
            <div class="modal-content">
              <h4>일치 갯수</h4>
              <h4>당첨금</h4>
              <h4>당첨 갯수</h4>
            </div>
            <div class="modal-result-content">
              <p>3개</p>
              <p>5,000</p>
              <p>n개</p>
            </div>
            <div class="modal-result-content">
              <p>4개</p>
              <p>50,000</p>
              <p>n개</p>
            </div>
            <div class="modal-result-content">
              <p>5개</p>
              <p>1,500,000</p>
              <p>n개</p>
            </div>
            <div class="modal-result-content">
              <p>5개+보너스볼</p>
              <p>30,000,000</p>
              <p>n개</p>
            </div>
            <div class="modal-result-content">
              <p>6개</p>
              <p>2,000,000,000</p>
              <p>n개</p>
            </div>
          </div>
          <div class="winning-result">
            <p>당신의 총 수익률은 %입니다.</p>
          </div>
          <form method="dialog">
            <button class="submit" id="restart-button">다시 시작하기</button>
          </form>
        </div>
      </dialog>

    </div>
  </main>
  <footer>
    <p>Copyright 2023. woowacourse</p>
  </footer>
</div>
</body>
</html>
